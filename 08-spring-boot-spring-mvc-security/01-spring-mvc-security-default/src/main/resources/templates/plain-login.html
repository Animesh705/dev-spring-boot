<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login | LuvIsCode</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #4e73df, #224abe);
            height: 100vh;
        }

        .login-card {
            border-radius: 12px;
            padding: 30px;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #4e73df;
        }

        .btn-primary {
            background-color: #4e73df;
            border: none;
        }

        .btn-primary:hover {
            background-color: #2e59d9;
        }
    </style>
</head>
<body>

<div class="d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow login-card" style="width: 350px;">

        <div class="text-center mb-4">
            <h4 class="fw-bold">Welcome Back</h4>
            <p class="text-muted small">Login to continue</p>
        </div>

        <form th:action="@{/authenticateTheUser}" method="post">

            <!-- Error Message -->
            <div th:if="${param.error != null}" class="alert alert-danger text-center py-2">
                Invalid username or password
            </div>

            <!-- Username -->
            <input type="text"
                   name="username"
                   class="form-control mb-3"
                   placeholder="Username"
                   required>

            <!-- Password -->
            <input type="password"
                   name="password"
                   class="form-control mb-4"
                   placeholder="Password"
                   required>

            <!-- Button -->
            <button class="btn btn-primary w-100">
                Login
            </button>

        </form>

    </div>
</div>
<!-- JS for animation -->
<script>
    const btn = document.getElementById("loginBtn");
    const username = document.querySelector("input[name='username']");
    const password = document.querySelector("input[name='password']");

    btn.addEventListener("mouseenter", () => {
        if (username.value.trim() === "" || password.value.trim() === "") {

            const x = Math.random() * 200 - 100;
            const y = Math.random() * 200 - 100;

            btn.style.transform = `translate(${x}px, ${y}px)`;
        }
    });

    function resetPosition() {
        if (username.value.trim() !== "" && password.value.trim() !== "") {
            btn.style.transform = "translate(0,0)";
        }
    }

    username.addEventListener("input", resetPosition);
    password.addEventListener("input", resetPosition);
</script>
</body>
</html>
