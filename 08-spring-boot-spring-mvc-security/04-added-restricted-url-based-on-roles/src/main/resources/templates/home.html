<!DOCTYPE html>
<html lang="en"
xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity4">
<head>
    <meta charset="UTF-8">

    <title>luvIsCode Home Page</title>
</head>
<body>
    <h2>LuvIsCode Home Page</h2>
    <hr>
Welcome to LuvIsCode <span sec:authentication="principal.username"></span>!
    <!-- it will display the username and role of the person who loged in-->

    <br>
    <br>
    Role(s):<span sec:authentication="principal.authorities">  </span>
    <hr>
    <!-- add a link to point to/leaders ........ this is for the managers -->
    <p>
        <a th:href="@{/leaders}">Leadership Meeting</a>
        (only for Manager peeps)
    </p>
    <!-- add a link to point to/systems ........ this is for the admin-->
    <p>
        <a th:href="@{/systems}">It Systems Meeting</a>
        (only for Admin role)
    </p>
    <hr>
<!-- adding logout button to our home page -->
    <form action="#" th:action="@{/logout}" method="post" >
        <input type="submit" class="btn btn-primary w-100" value="Logout">
    </form>
</body>
</html>
