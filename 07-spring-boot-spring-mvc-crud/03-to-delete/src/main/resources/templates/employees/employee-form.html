<!-- html page where we will add the new employee -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- required meta tags -->
    <meta charset="UTF-8">
   <!-- bootstrap css-->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <title>Save new Employee</title>
</head>
<body>
<div class="container">

    <h3>Employeen Directory</h3>
    <hr>
    <p class="h4 mb-4">Save Employee</p>

    <!-- real work of sending form data to /employees/save -->
    <form action="#" th:action="@{/employees/save}"
          th:object="${employee}" method="POST">
        <!--Add hidden form field to handel the update -->
        <input type="hidden" th:field="*{id}">

        <!-- lets define our input fields-->
        <input type="text"  th:field="*{firstName}"
               class="form-control mb-4 w-30" placeholder="First Name">
        <input type="text"  th:field="*{lastName}"
               class="form-control mb-4 w-30" placeholder="Last Name">
        <input type="text"  th:field="*{email}"
               class="form-control mb-4 w-30" placeholder="Email id">

        <button type="submit" class="btn btn-info col-2">Save</button>
        </form>
    <hr>
    <a th:href="@{/employees/list}" class="btn btn-info btn-secondary">
        Back To Employees List
    </a>
</div>
</body>
</html>
